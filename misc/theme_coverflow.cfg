# Built-in "Coverflow" theme (decision C2 "b"): a turnkey coverflow variant of the
# default OPL theme. GAMES mode shows the 3D-style cover carousel; APPS mode keeps a
# normal list. NOTE: the carousel layout (cover y/width/height, coverflow_cover_offset)
# is a first-cut and is meant to be tuned visually on hardware/PCSX2.
#
# Why main2 is an offscreen ItemsList: the menu paging/navigation code keeps the live
# list state (current/pagestart/displayedItems) in an ItemsList element. Coverflow draws
# from that state but renders its own carousel, so we keep a real ItemsList present (but
# parked offscreen, invisible) to feed displayedItems and keep gTheme->itemsList valid.
bg_color=#182580
sel_text_color=#ffffff
text_color=#324d9e
ui_text_color=#00FFFF
main0:
	type=Background
	pattern=BG
main1:
	type=MenuIcon
	x=0
	y=0
	aligned=0
	scaled=0
	width=DIM_INF
	height=DIM_INF
