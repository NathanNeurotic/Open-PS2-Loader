# Built-in "<Coverflow>" theme -- coverflow render mode, matched to wOPL's reference
# theme_coverflow.cfg (KrahJohlito). It honors wOPL's coverflow-element settings (cover
# offset, dimensions, reflection, case/apps_case overlay corners, and a SEPARATE apps
# carousel) while using OPL's own background, list and info-page assets where wOPL
# referenced textures/attributes we don't ship. Tune main2/appsMain2 (y/width/height) and
# coverflow_cover_offset to taste on PCSX2/hardware.
bg_color=#182580
sel_text_color=#ffffff
text_color=#324d9e
ui_text_color=#00FFFF
coverflow_cover_offset=14
main0:
	type=Background
	pattern=BG
main1:
