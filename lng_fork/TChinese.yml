  BDMA_MODE_MMCE: MMCE (exFAT)
  BDMA_MODE_ATA: HDD (exFAT)
  BDMA_ERR_SRC: 在來源裝置上找不到 BDMA 模組檔案。
  BDMA_ERR_SPACE: 記憶卡空間不足，無法存放 BDMA 模組。
  BDMA_ERR_IO: 將 BDMA 模組寫入記憶卡時發生錯誤。
