  "BGM_VOLUME": "Volume sa Musika sa Background"
  "DEF_BGM_PATH": "Default nga Musika sa Tema"
  "DEF_BGM_PATH_HINT": "Itakda ang path aron mag-stream og musika para sa internal nga tema."
