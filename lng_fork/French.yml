  NEUTRINO_BAD_FORMAT: Neutrino ne supporte pas ce format de fichier, lancement avec le noyau <OPL>
  NEUTRINO_NOT_FOUND: ELF Neutrino introuvable, lancement avec le noyau <OPL>
