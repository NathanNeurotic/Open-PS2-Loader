  VCD: VCD
  VCD_ON: 正在显示 VCD 游戏
  VCD_OFF: 正在显示光盘游戏
  NEUTRINO_ARGS: Neutrino 启动参数
  HINT_NEUTRINO_ARGS: 额外的 Neutrino 标志，以空格分隔（如 -mt=dvd）。全局参数适用于所有游戏；单游戏参数在此基础上追加。在标志前加 $ 可禁用而不删除。
