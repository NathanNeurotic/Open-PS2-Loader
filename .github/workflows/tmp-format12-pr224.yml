name: Temporary clang-format 12 PR 224

on:
  push:
    branches:
      - agent/apa-hdl-diagnostic-logging

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/apa-hdl-diagnostic-logging
      - name: Apply repository clang-format 12
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src'
          extensions: 'c,h'
          clangFormatVersion: 12
          inplace: true
      - name: Commit formatted source and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hdd.c src/hddsupport.c
          git rm .github/workflows/tmp-format12-pr224.yml
          git diff --cached --quiet || git commit -m "Apply clang-format 12 to diagnostic test"
          git push origin HEAD:agent/apa-hdl-diagnostic-logging
