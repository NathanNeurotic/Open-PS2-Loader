name: Inspect format job log

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Retrieve format-job diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/88367599353/logs" \
            -o /tmp/format-job.log
          tail -n 140 /tmp/format-job.log > format-job-tail.txt

      - name: Publish diagnostics
        run: |
          git config user.name "ChatGPT"
          git config user.email "noreply@openai.com"
          git add format-job-tail.txt
          tree=$(git write-tree)
          parent=$(git rev-parse HEAD)
          commit=$(printf '%s\n' "Capture format check diagnostics" | git commit-tree "$tree" -p "$parent")
          git push --force origin "$commit":refs/heads/agent/format-log-inspect
