name: Apply exact CI formatting

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reset to four functional commits
        run: |
          git fetch origin 311c92afe3a308c0c39e218396ccbc4cd4795c3c
          git reset --hard FETCH_HEAD

      - name: Apply repository CI formatting
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: '.'
          extensions: 'h,c'
          clangFormatVersion: 12
          style: file
          inplace: true

      - name: Publish formatted tree
        run: |
          git config user.name "ChatGPT"
          git config user.email "noreply@openai.com"
          git add -u
          parent=$(git rev-parse HEAD)
          tree=$(git write-tree)
          commit=$(printf '%s\n' "Apply repository CI formatting" | git commit-tree "$tree" -p "$parent")
          git push --force origin "$commit":refs/heads/agent/ci-format-v12-stage
