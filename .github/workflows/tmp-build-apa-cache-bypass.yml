name: Build APA HDL cache-bypass branch

on:
  push:
    branches:
      - agent/apa-hdl-cache-bypass
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/apa-hdl-cache-bypass
      - name: Apply cache-bypass experiment
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/hddsupport.c')
          text = path.read_text()
          start = text.index('static int hddUpdateGameList(item_list_t *itemList)\n')
          end = text.index('\nstatic int hddGetGameCount(item_list_t *itemList)\n', start)
          replacement = '''static int hddUpdateGameList(item_list_t *itemList)\n{\n    if (hddApaState != HDD_APA_READY)\n        return 0;\n\n    if (vcdViewActive(itemList->mode))\n        return hddVcdListBuilt ? hddVcdGameCount : hddBuildVcdGameList();\n\n    // Hardware-test experiment: bypass games.bin completely and publish only a fresh\n    // live APA/HDL scan. This isolates stale/corrupt cache handling from enumeration.\n    hdl_games_list_t hddGamesNew = {0, NULL};\n    int ret = hddGetHDLGamelist(&hddGamesNew);\n\n    if (ret == 0) {\n        hddFreeHDLGamelist(&hddGames);\n        hddGames = hddGamesNew;\n    } else {\n        hddFreeHDLGamelist(&hddGamesNew);\n    }\n\n    hddForceUpdate = 1;\n    return ret == 0 ? hddGames.count : 0;\n}\n'''
          text = text[:start] + replacement + text[end:]
          path.write_text(text)
          PY
      - name: Format cache-bypass source
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src/hddsupport.c'
          extensions: 'c'
          clangFormatVersion: 18
          inplace: true
      - name: Commit cache-bypass branch and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/tmp-build-apa-cache-bypass.yml .tmp-branch-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/hddsupport.c .github/workflows/tmp-build-apa-cache-bypass.yml .tmp-branch-trigger
          git commit -m 'Bypass HDD game-list cache for live APA scan'
          git push origin HEAD:agent/apa-hdl-cache-bypass
