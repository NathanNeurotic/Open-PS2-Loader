name: Temporary format PR 224

on:
  push:
    branches:
      - agent/apa-hdl-diagnostic-logging
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/apa-hdl-diagnostic-logging
      - name: Apply repository clang-format
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src/hdd.c ./src/hddsupport.c'
          extensions: 'c'
          clangFormatVersion: 18
          inplace: true
      - name: Commit formatted source and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/tmp-format-pr224.yml .tmp-format-pr224-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Format APA HDL diagnostics'
          git push origin HEAD:agent/apa-hdl-diagnostic-logging
