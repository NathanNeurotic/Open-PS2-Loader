name: Build Grok APA HDL retry experiment

on:
  push:
    branches:
      - agent/grok-apa-hdl-retry
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/grok-apa-hdl-retry
      - name: Apply bounded normal-scan retry experiment
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/hddsupport.c')
          text = path.read_text()
          start = text.index('static int hddUpdateGameList(item_list_t *itemList)\n')
          end = text.index('\nstatic int hddGetGameCount(item_list_t *itemList)\n', start)
          replacement = '''#define HDD_GROK_SCAN_ATTEMPTS 10
          #define HDD_GROK_RETRY_DELAY_US (250 * 1000)

          static int hddUpdateGameList(item_list_t *itemList)
          {
              if (hddApaState != HDD_APA_READY)
                  return 0;

              if (vcdViewActive(itemList->mode))
                  return hddVcdListBuilt ? hddVcdGameCount : hddBuildVcdGameList();

              hdl_games_list_t hddGamesNew;
              int ret;

              if (((ret = hddLoadGameListCache(&hddGames)) != 0) || hddForceUpdate || (hddGames.count == 0)) {
                  int attempt;

                  hddGamesNew.count = 0;
                  hddGamesNew.games = NULL;

                  for (attempt = 1; attempt <= HDD_GROK_SCAN_ATTEMPTS; attempt++) {
                      ret = hddGetHDLGamelist(&hddGamesNew);
                      LOG("HDD GROK RETRY: attempt %d/%d ret=%d count=%u\\n", attempt, HDD_GROK_SCAN_ATTEMPTS, ret, hddGamesNew.count);

                      if ((ret == 0 && hddGamesNew.count > 0) || attempt == HDD_GROK_SCAN_ATTEMPTS)
                          break;

                      hddFreeHDLGamelist(&hddGamesNew);
                      hddGamesNew.count = 0;
                      hddGamesNew.games = NULL;
                      DelayThread(HDD_GROK_RETRY_DELAY_US);
                  }

                  if (ret == 0) {
                      hddUpdateGameListCache(&hddGames, &hddGamesNew);
                      hddFreeHDLGamelist(&hddGames);
                      hddGames = hddGamesNew;
                  } else {
                      hddFreeHDLGamelist(&hddGamesNew);
                  }
              }

              hddForceUpdate = 1;
              return ret == 0 ? hddGames.count : 0;
          }
          '''
          replacement = '\n'.join(line[10:] if line.startswith('          ') else line for line in replacement.splitlines()) + '\n'
          path.write_text(text[:start] + replacement + text[end:])
          PY
      - name: Apply repository clang-format
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src/hddsupport.c'
          extensions: 'c'
          clangFormatVersion: 18
          inplace: true
      - name: Commit experiment and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/tmp-build-grok-apa-retry.yml .tmp-grok-apa-retry-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Retry transient APA HDL scans before publishing empty list'
          git push origin HEAD:agent/grok-apa-hdl-retry
