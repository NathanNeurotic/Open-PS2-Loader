name: Rolling Release

# Continuously publishes the current master build to a single "rolling" pre-release
# so it can be pulled directly from GitHub at a stable URL as development progresses.
#
# Builds with BOTH toolchains, matching compilation.yml, so a regression in either
# is visible from the rolling channel:
#   * ps2max/dev (pinned)      -> OPNPS2LD.ELF                 (primary / stable toolchain)
#   * ps2dev/ps2dev:latest     -> OPNPS2LD-ps2dev-latest.ELF   (bleeding-edge toolchain)
#
# Deliberately additive and self-contained:
#   * Publishes ONLY to the "rolling" tag / pre-release (created on first run).
#   * Does NOT modify the curated tagged releases, the existing "latest" pre-release
#     managed by compilation.yml, or any branch. It only uploads release assets.
#   * Builds run inside their toolchain containers; publishing runs on the host
#     runner, which ships the gh CLI.
#
# The bleeding-edge build is best-effort (continue-on-error): if ps2dev/ps2dev:latest
# breaks, the rolling release still updates with the pinned build.

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

# Only one rolling publish at a time; newer pushes supersede in-flight runs.
concurrency:
  group: rolling-release
  cancel-in-progress: true

jobs:
  build-rolling-pinned:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mark workspace safe and fetch history
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow || true

      - name: Get version
        id: ver
        run: echo "version=$(make oplversion)" >> "$GITHUB_OUTPUT"

      - name: Build (make clean release)
        run: make --trace clean release

      - name: Detailed changelog
        run: sh ./make_changelog.sh

      - name: Stage rolling assets
        run: |
          set -eu
          mkdir -p rolling
          # Every release ELF produced by `make release`.
          cp OPNPS2LD-*.ELF rolling/ 2>/dev/null || true
          # Stable, version-agnostic name so a script can always fetch the same URL.
          MAIN_ELF="OPNPS2LD-${{ steps.ver.outputs.version }}.ELF"
          if [ ! -f "$MAIN_ELF" ]; then
            MAIN_ELF="$(ls OPNPS2LD-*.ELF 2>/dev/null | head -n1)"
          fi
          if [ -n "${MAIN_ELF:-}" ] && [ -f "$MAIN_ELF" ]; then
            cp -f "$MAIN_ELF" rolling/OPNPS2LD.ELF
          fi
          [ -f DETAILED_CHANGELOG ] && cp -f DETAILED_CHANGELOG rolling/ || true
          echo "Staged pinned rolling assets:"
          ls -la rolling

      - name: Upload pinned rolling assets
        uses: actions/upload-artifact@v6
        with:
          name: rolling-assets-pinned
          path: rolling
          if-no-files-found: error

  build-rolling-ps2dev-latest:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    # Bleeding-edge toolchain: best-effort, must not block the rolling publish.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies (Alpine only)
        run: |
          if command -v apk >/dev/null 2>&1; then
            # Consolidated ps2dev Alpine prerequisites: build tools, scripting, packaging, and gcc runtime libs.
            apk add --no-cache \
              bash \
              make \
              git \
              zip \
              unzip \
              tar \
              gzip \
              xz \
              python3 \
              py3-pip \
              py3-yaml \
              gmp \
              mpfr4 \
              mpc1 \
              perl \
              cmake \
              pkgconf \
              coreutils \
              findutils \
              grep \
              sed \
              gawk \
              diffutils
          fi

      - name: Mark workspace safe and fetch history
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow || true

      - name: Build (make clean release)
        run: make --trace clean release

      - name: Detailed changelog
        run: sh ./make_changelog.sh

      - name: Stage rolling assets (ps2dev-latest)
        run: |
          set -eu
          mkdir -p rolling
          VERSION="$(make oplversion)"
          # Suffix each release ELF so it cannot collide with the pinned build's
          # identically-named ELFs in the shared rolling release.
          for f in OPNPS2LD-*.ELF; do
            [ -f "$f" ] || continue
            cp -f "$f" "rolling/${f%.ELF}-ps2dev-latest.ELF"
          done
          # Stable, version-agnostic name for the bleeding-edge build.
          MAIN_ELF="OPNPS2LD-${VERSION}.ELF"
          if [ ! -f "$MAIN_ELF" ]; then
            MAIN_ELF="$(ls OPNPS2LD-*.ELF 2>/dev/null | head -n1)"
          fi
          if [ -n "${MAIN_ELF:-}" ] && [ -f "$MAIN_ELF" ]; then
            cp -f "$MAIN_ELF" rolling/OPNPS2LD-ps2dev-latest.ELF
          fi
          echo "Staged ps2dev-latest rolling assets:"
          ls -la rolling

      - name: Upload ps2dev-latest rolling assets
        uses: actions/upload-artifact@v6
        with:
          name: rolling-assets-ps2dev-latest
          path: rolling
          if-no-files-found: error

  publish-rolling:
    needs: [build-rolling-pinned, build-rolling-ps2dev-latest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPL_VERSION: ${{ needs.build-rolling-pinned.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download pinned rolling assets
        uses: actions/download-artifact@v8
        with:
          name: rolling-assets-pinned
          path: rolling

      - name: Download ps2dev-latest rolling assets
        # Optional: the bleeding-edge build may have failed; publish what we have.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: rolling-assets-ps2dev-latest
          path: rolling

      - name: Build release notes
        run: |
          set -eu
          HAS_LATEST=no
          [ -f rolling/OPNPS2LD-ps2dev-latest.ELF ] && HAS_LATEST=yes
          {
            printf 'Rolling build of master (not a stable release).\n\n'
            printf 'Version: %s\n' "$OPL_VERSION"
            printf 'Commit: %s/%s/commit/%s\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_SHA"
            printf 'Built: %s UTC\n' "$(date -u '+%Y-%m-%d %H:%M')"
            printf 'Run: %s/%s/actions/runs/%s\n\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf 'Toolchain builds:\n'
            printf '  - OPNPS2LD.ELF                -> ps2max/dev (pinned) toolchain\n'
            if [ "$HAS_LATEST" = yes ]; then
              printf '  - OPNPS2LD-ps2dev-latest.ELF  -> ps2dev/ps2dev:latest toolchain\n'
            else
              printf '  - ps2dev/ps2dev:latest build FAILED this run (pinned build only)\n'
            fi
            printf '\nBoth stable asset names always track the latest master build.\n'
            printf 'This pre-release is independent of the tagged releases and the "latest" pre-release.\n'
          } > notes.md
          echo "ps2dev-latest present: $HAS_LATEST"
          cat notes.md
          echo "Assets to publish:"
          ls -la rolling

      - name: Publish or update the rolling pre-release
        run: |
          set -eu
          if gh release view rolling >/dev/null 2>&1; then
            echo "Updating existing rolling pre-release"
            gh release edit rolling --title "Rolling (master)" --notes-file notes.md --prerelease
            gh release upload rolling rolling/* --clobber
          else
            echo "Creating rolling pre-release"
            gh release create rolling rolling/* \
              --title "Rolling (master)" \
              --notes-file notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
