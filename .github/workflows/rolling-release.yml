name: Rolling Release

# Continuously publishes the current master build to a single "rolling" pre-release
# so it can be pulled directly from GitHub at a stable URL as development progresses.
#
# Builds with BOTH toolchains, matching compilation.yml, so a regression in either
# is visible from the rolling channel:
#   * ps2max/dev (pinned)      -> OPNPS2LD.ELF                 (primary / stable toolchain)
#   * ps2dev/ps2dev:latest     -> OPNPS2LD-ps2dev-latest.ELF   (bleeding-edge toolchain)
#
# A source snapshot (OPNPS2LD-<version>-src.zip) of the exact built commit is also
# published, so every rolling build is self-preserving: testers can restore and
# rebuild precisely what they ran, even if history is later rewritten.
#
# Deliberately additive and self-contained:
#   * Publishes ONLY to the "rolling" tag / pre-release (created on first run).
#   * Does NOT modify the curated tagged releases, the existing "latest" pre-release
#     managed by compilation.yml, or any branch. It only uploads release assets.
#   * Builds run inside their toolchain containers; publishing runs on the host
#     runner, which ships the gh CLI.
#
# The bleeding-edge build is best-effort (continue-on-error): if ps2dev/ps2dev:latest
# breaks, the rolling release still updates with the pinned build.

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

# Only one rolling publish at a time; newer pushes supersede in-flight runs.
concurrency:
  group: rolling-release
  cancel-in-progress: true

jobs:
  build-rolling-pinned:
    runs-on: ubuntu-latest
    container: ps2max/dev:v20250725-2
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mark workspace safe and fetch history
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow || true

      - name: Get version
        id: ver
        run: echo "version=$(make oplversion)" >> "$GITHUB_OUTPUT"

      - name: Build (make clean release)
        run: make --trace clean release

      - name: Detailed changelog
        run: sh ./make_changelog.sh

      - name: Stage rolling assets
        run: |
          set -eu
          mkdir -p rolling
          # Publish ONLY the stable, version-agnostic name. Versioned filenames
          # embed the commit, so they change every run and pile up as stale
          # assets -- confusing on a rolling channel.
          MAIN_ELF="OPNPS2LD-${{ steps.ver.outputs.version }}.ELF"
          if [ ! -f "$MAIN_ELF" ]; then
            MAIN_ELF="$(ls OPNPS2LD-*.ELF 2>/dev/null | head -n1)"
          fi
          if [ -z "${MAIN_ELF:-}" ] || [ ! -f "$MAIN_ELF" ]; then
            echo "No OPNPS2LD ELF produced by the pinned build" >&2
            exit 1
          fi
          cp -f "$MAIN_ELF" rolling/OPNPS2LD.ELF
          [ -f DETAILED_CHANGELOG ] && cp -f DETAILED_CHANGELOG rolling/ || true
          echo "Staged pinned rolling assets:"
          ls -la rolling

      - name: Upload pinned rolling assets
        uses: actions/upload-artifact@v6
        with:
          name: rolling-assets-pinned
          path: rolling
          if-no-files-found: error

  build-rolling-ps2dev-latest:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    # Bleeding-edge toolchain: best-effort, must not block the rolling publish.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies (Alpine only)
        run: |
          if command -v apk >/dev/null 2>&1; then
            # Consolidated ps2dev Alpine prerequisites: build tools, scripting, packaging, and gcc runtime libs.
            apk add --no-cache \
              bash \
              make \
              git \
              zip \
              unzip \
              tar \
              gzip \
              xz \
              python3 \
              py3-pip \
              py3-yaml \
              gmp \
              mpfr4 \
              mpc1 \
              perl \
              cmake \
              pkgconf \
              coreutils \
              findutils \
              grep \
              sed \
              gawk \
              diffutils
          fi

      - name: Mark workspace safe and fetch history
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow || true

      - name: Build (make clean release)
        run: make --trace clean release

      - name: Detailed changelog
        run: sh ./make_changelog.sh

      - name: Stage rolling assets (ps2dev-latest)
        run: |
          set -eu
          mkdir -p rolling
          # Publish ONLY the stable, version-agnostic name for the bleeding-edge build.
          MAIN_ELF="$(ls OPNPS2LD-*.ELF 2>/dev/null | head -n1)"
          if [ -z "${MAIN_ELF:-}" ] || [ ! -f "$MAIN_ELF" ]; then
            echo "No OPNPS2LD ELF produced by the ps2dev-latest build" >&2
            exit 1
          fi
          cp -f "$MAIN_ELF" rolling/OPNPS2LD-ps2dev-latest.ELF
          echo "Staged ps2dev-latest rolling assets:"
          ls -la rolling

      - name: Upload ps2dev-latest rolling assets
        uses: actions/upload-artifact@v6
        with:
          name: rolling-assets-ps2dev-latest
          path: rolling
          if-no-files-found: error

  publish-rolling:
    needs: [build-rolling-pinned, build-rolling-ps2dev-latest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPL_VERSION: ${{ needs.build-rolling-pinned.outputs.version }}
      # Pinned ps2sdk/toolchain tag used for the RIPTOPL package name. Bump alongside the
      # build-rolling-pinned container (ps2max/dev:...).
      SDK_VER: "v20250725-2"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download pinned rolling assets
        uses: actions/download-artifact@v8
        with:
          name: rolling-assets-pinned
          path: rolling

      - name: Download ps2dev-latest rolling assets
        # Optional: the bleeding-edge build may have failed; publish what we have.
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: rolling-assets-ps2dev-latest
          path: rolling

      - name: Name assets with the build version
        run: |
          set -eu
          # Apply ONE authoritative version (from the pinned build, which resolves
          # full git history) to BOTH toolchains. The source commit is identical, so
          # the only difference is the -ps2dev-latest suffix; this also sidesteps the
          # ps2dev-latest container's short/"dirty" git describe. Each build becomes a
          # single file whose name carries both the product name and the version.
          VER="${OPL_VERSION:-}"
          if [ -z "$VER" ]; then
            VER="rolling-${GITHUB_SHA}"
          fi
          echo "VERSIONED_BASE=OPNPS2LD-${VER}" >> "$GITHUB_ENV"
          if [ -f rolling/OPNPS2LD.ELF ]; then
            mv -f rolling/OPNPS2LD.ELF "rolling/OPNPS2LD-${VER}.ELF"
          fi
          if [ -f rolling/OPNPS2LD-ps2dev-latest.ELF ]; then
            mv -f rolling/OPNPS2LD-ps2dev-latest.ELF "rolling/OPNPS2LD-${VER}-ps2dev-latest.ELF"
          fi
          echo "Renamed assets:"
          ls -la rolling

      - name: Archive source snapshot
        run: |
          set -eu
          # Bundle the exact source that produced these ELFs so the rolling build
          # is self-preserving: a tester can always restore and rebuild this precise
          # commit later, even if history is rewritten or a branch disappears.
          # git archive snapshots only TRACKED files at HEAD (== the built commit);
          # generated files (e.g. the gitignored lang_autogen.h) are intentionally
          # excluded because the build regenerates them. The project has no
          # submodules, so HEAD is the complete source tree. --prefix gives a clean
          # top-level folder on extraction. --format=zip uses git's built-in zip
          # writer (no external tooling needed).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --format=zip \
            --prefix="${VERSIONED_BASE}-src/" \
            -o "rolling/${VERSIONED_BASE}-src.zip" \
            HEAD
          echo "Source snapshot:"
          ls -la "rolling/${VERSIONED_BASE}-src.zip"

      - name: Compute SHA256 checksums
        run: |
          set -eu
          # Publish SHA256 of every binary + the source snapshot so each rolling build is
          # verifiable for restoration/archival. SHA256SUMS.txt is uploaded as a release
          # asset and the same hashes are listed in the release notes below.
          cd rolling
          : > SHA256SUMS.txt
          for f in *.ELF *-src.zip; do
            if [ -f "$f" ]; then sha256sum "$f" >> SHA256SUMS.txt; fi
          done
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Build RIPTOPL release package
        run: |
          set -eu
          # Full installable package the user copies to a memory card / device:
          #   APP_RIPTOPL/RIPTOPL.ELF  -- the loader (the pinned build, renamed; the loose
          #                               OPNPS2LD ELFs above are kept for direct download).
          #   POPSTARTER/              -- POPSTARTER's SMB network stack (popsmb/) + bdma_config.txt
          #                               preset to fat32; copied to mc?:/POPSTARTER/.
          #   POPS/                    -- POPSTARTER.ELF + the BDMA exFAT driver variants + the patch
          #                               (vendored from POPSLoader); copied to <device>:/POPS/.
          #   neutrino_*.7z            -- the official latest Neutrino core build (rickgaiser/neutrino),
          #                               bundled unmodified so the prerequisite ships with the release.
          PKG=riptopl_pkg
          rm -rf "$PKG"
          mkdir -p "$PKG/APP_RIPTOPL" "$PKG/POPSTARTER" "$PKG/POPS"
          cp -f "rolling/${VERSIONED_BASE}.ELF" "$PKG/APP_RIPTOPL/RIPTOPL.ELF"
          cp -f popsmb/* "$PKG/POPSTARTER/"
          cp -f pops/* "$PKG/POPS/"
          # neutrino_*.7z (package root) -- the official latest pre-release of the Neutrino core, so
          # that prerequisite ships with every release. Best-effort: a fetch failure still publishes
          # the rest. The archive is bundled UNMODIFIED (clean attribution); the user extracts it and
          # copies neutrino.elf to mc?:/neutrino/. Always credited/linked in the release notes below.
          NEUTRINO_VER=""
          if gh release download latest --repo rickgaiser/neutrino --dir "$PKG" --pattern '*.7z' --clobber 2>/dev/null; then
            NEUTRINO_ARCHIVE="$(cd "$PKG" && ls neutrino_*.7z 2>/dev/null | head -n1)"
            NEUTRINO_VER="$(printf '%s' "$NEUTRINO_ARCHIVE" | sed -e 's/^neutrino_//' -e 's/\.7z$//')"
            echo "Bundled neutrino: $NEUTRINO_ARCHIVE"
          else
            echo "WARN: could not fetch neutrino latest pre-release; package omits it this run"
          fi
          echo "NEUTRINO_VER=${NEUTRINO_VER}" >> "$GITHUB_ENV"
          REL="${OPL_VERSION:-rolling}"
          # <SHA256>: first 16 hex of the RIPTOPL.ELF SHA256 (integrity + uniqueness; full hash is
          # in SHA256SUMS-style listing inside the zip is overkill, the short tag suffices).
          SHA="$(sha256sum "$PKG/APP_RIPTOPL/RIPTOPL.ELF" | cut -c1-16)"
          ZIP="RIPTOPL-${SDK_VER}-${REL}-${SHA}.zip"
          (
            cd "$PKG"
            zip -r -X "../rolling/${ZIP}" APP_RIPTOPL POPSTARTER POPS >/dev/null
            for f in neutrino_*.7z; do # add the bundled Neutrino archive at the zip root if present
              if [ -f "$f" ]; then zip -X "../rolling/${ZIP}" "$f" >/dev/null; fi
            done
          )
          echo "Built rolling/${ZIP}:"
          unzip -l "rolling/${ZIP}"

      - name: Build release notes
        run: |
          set -eu
          HAS_LATEST=no
          [ -f "rolling/${VERSIONED_BASE}-ps2dev-latest.ELF" ] && HAS_LATEST=yes
          {
            printf 'Rolling build of master (not a stable release).\n\n'
            printf 'Version: %s\n' "$OPL_VERSION"
            printf 'Commit: %s/%s/commit/%s\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_SHA"
            printf 'Built: %s UTC\n' "$(date -u '+%Y-%m-%d %H:%M')"
            printf 'Run: %s/%s/actions/runs/%s\n\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf 'Toolchain builds (one file each, the filename includes the version):\n'
            printf '  - %s.ELF                -> ps2max/dev (pinned) toolchain\n' "$VERSIONED_BASE"
            if [ "$HAS_LATEST" = yes ]; then
              printf '  - %s-ps2dev-latest.ELF  -> ps2dev/ps2dev:latest toolchain\n' "$VERSIONED_BASE"
            else
              printf '  - ps2dev/ps2dev:latest build FAILED this run (pinned build only)\n'
            fi
            printf '\nBundled Neutrino core (required by the Neutrino launch mode), from the official repo:\n'
            printf '  https://github.com/rickgaiser/neutrino\n'
            if [ -n "${NEUTRINO_VER:-}" ]; then
              printf '  Included build: %s -- bundled UNMODIFIED in the RIPTOPL package root (neutrino_*.7z);\n' "$NEUTRINO_VER"
              printf '  extract it and copy neutrino.elf to mc?:/neutrino/.\n'
            else
              printf '  (Could not fetch Neutrino this run -- please grab the latest build from the link above.)\n'
            fi
            printf '  Neutrino is the work of its authors; RiptOPL only bundles the official build for convenience.\n'
            printf '\nSource snapshot (for preservation / offline rebuild of this exact commit):\n'
            printf '  - %s-src.zip\n' "$VERSIONED_BASE"
            printf '\nSHA256 (also published as SHA256SUMS.txt):\n'
            printf '```\n'
            cat rolling/SHA256SUMS.txt
            printf '```\n'
            printf '\nUpdated on every push to master. Independent of the tagged releases and the "latest" pre-release.\n'
          } > notes.md
          echo "ps2dev-latest present: $HAS_LATEST"
          cat notes.md
          echo "Assets to publish:"
          ls -la rolling

      - name: Publish or update the rolling pre-release
        run: |
          set -eu
          if gh release view rolling >/dev/null 2>&1; then
            echo "Updating existing rolling pre-release"
            # Remove every existing asset first so renamed/stale builds from prior
            # runs cannot accumulate; then upload the current fixed-name set.
            for asset in $(gh release view rolling --json assets --jq '.assets[].name'); do
              echo "Deleting old asset: $asset"
              gh release delete-asset rolling "$asset" --yes || true
            done
            gh release edit rolling --title "Rolling (master)" --notes-file notes.md --prerelease
            gh release upload rolling rolling/* --clobber
          else
            echo "Creating rolling pre-release"
            gh release create rolling rolling/* \
              --title "Rolling (master)" \
              --notes-file notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
