name: Source patch runner

on:
  pull_request:
    branches:
      - agent/source-patch-runner
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply selected focused patch
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          branch = os.environ['HEAD_REF']

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'expected patch anchor not found in {path}')
              p.write_text(text.replace(old, new, 1))

          if branch == 'agent/fix-boot-hdd-probe':
              old = '''    char pwd[8];
    char redirectPath[64];
    int value;
    DIR *dir;

    getcwd(pwd, sizeof(pwd));

    if (readConfigPathRedirect(redirectPath, sizeof(redirectPath))) {
        configEnd();
        configInit(redirectPath);
        value = configReadMulti(types);
        if (value & CONFIG_OPL)
            return value;
    }

    // Try both memory cards explicitly before probing slower removable devices.
    if ((value = checkLoadConfigMC(types)) != 0)
        return value;

    // First, try the device that OPL booted from.
    if (!strncmp(pwd, "mass", 4) && (pwd[4] == ':' || pwd[5] == ':')) {
        if ((value = checkLoadConfigBDM(types)) != 0)
            return value;
    } else if (!strncmp(pwd, "hdd", 3) && (pwd[3] == ':' || pwd[4] == ':')) {
        if ((value = checkLoadConfigHDD(types)) != 0)
            return value;
    }

    // Config was not found on the boot device. Check all supported devices.
    // Check MMCE before BDM.
    if ((value = checkLoadConfigMMCE(types)) != 0)
        return value;
    // Check BDM devices.
    if ((value = checkLoadConfigBDM(types)) != 0)
        return value;
    // Check BDM HDD with a short bounded wait.
    if ((value = checkLoadConfigBDMHDD(types)) != 0)
        return value;
    // Check HDD
    if ((value = checkLoadConfigHDD(types)) != 0)
        return value;
'''
              new = '''    char pwd[64] = "";
    char redirectPath[64];
    int value;
    DIR *dir;

    if (getcwd(pwd, sizeof(pwd)) == NULL)
        pwd[0] = '\\0';

    if (readConfigPathRedirect(redirectPath, sizeof(redirectPath))) {
        configEnd();
        configInit(redirectPath);
        value = configReadMulti(types);
        if (value & CONFIG_OPL)
            return value;
    }

    // Try both memory cards explicitly before probing slower removable devices.
    if ((value = checkLoadConfigMC(types)) != 0)
        return value;

    // First, try the device that OPL booted from. Internal-HDD module loading is allowed only when
    // cwd itself identifies an HDD boot; an ordinary MC/MMCE/USB boot must not turn expected HDD
    // absence into the user-facing 401 error during legacy config discovery.
    if (!strncmp(pwd, "mass", 4) && strchr(pwd, ':') != NULL) {
        if ((value = checkLoadConfigBDM(types)) != 0)
            return value;
    } else if ((!strncmp(pwd, "hdd", 3) || !strncmp(pwd, "pfs", 3)) && strchr(pwd, ':') != NULL) {
        if ((value = checkLoadConfigHDD(types)) != 0)
            return value;
    } else if (!strncmp(pwd, "ata", 3) && strchr(pwd, ':') != NULL) {
        if ((value = checkLoadConfigBDMHDD(types)) != 0)
            return value;
    }

    // Config was not found on the boot device. Check removable devices only. Do not blindly load
    // either internal-HDD backend here: explicit redirects and HDD boot identities were handled above,
    // while probing them on every no-config boot reports 401 on HDD-less Slim consoles.
    if ((value = checkLoadConfigMMCE(types)) != 0)
        return value;
    if ((value = checkLoadConfigBDM(types)) != 0)
        return value;
'''
              replace_once('src/opl.c', old, new)

          elif branch == 'agent/fix-mmce-vcd-art-quiesce':
              old = '''    // VCD view: hand off to POPSTARTER (by name) instead of the disc path below. Menu-launch only.
    if (gAutoLaunchBDMGame == NULL && game != NULL && vcdViewActive(itemList->mode)) {
        mmceLaunchVcd(itemList, game->name, configSet);
        return;
    }

    if (!cacheAbortMmceImageLoadsTimed(MMCE_ART_ABORT_WAIT_TICKS)) {
        // #120: the art worker is wedged in a blocking fileXio on a slow/desynced card. Do NOT cacheEnd(1)
        // here -- its TerminateThread(gArtThreadId) kills the worker MID-RPC and orphans the SHARED mmceman
        // channel (TK>0). The launch reads below then FAIL and RETURN to a still-running OPL (unlike a launch
        // that LoadExecPS2's away), poisoning every later card read. Abandon-and-retry instead (mirrors
        // thmLoad's redesign): toast and bail so the user retries once the card is calm. NEVER a hard
        // freeze -- guiWarning is non-blocking.
        guiWarning(_l(_STR_ERR_FILE_INVALID), 8);
        return;
    }
'''
              new = '''    // Quiesce every MMCE art read before either launch path performs card IO. The VCD handoff
    // resolves POPSTARTER and may equip BDMA modules from MMCE before deinit(), so allowing its early
    // return to bypass this guard can contend with the persistent art worker on the same mmceman channel.
    if (!cacheAbortMmceImageLoadsTimed(MMCE_ART_ABORT_WAIT_TICKS)) {
        // #120: the art worker is wedged in a blocking fileXio on a slow/desynced card. Do NOT cacheEnd(1)
        // here -- its TerminateThread(gArtThreadId) kills the worker MID-RPC and orphans the SHARED mmceman
        // channel (TK>0). Abandon-and-retry instead so the user can retry once the card is calm.
        guiWarning(_l(_STR_ERR_FILE_INVALID), 8);
        return;
    }

    // VCD view: hand off to POPSTARTER (by name) instead of the disc path below. Menu-launch only.
    if (gAutoLaunchBDMGame == NULL && game != NULL && vcdViewActive(itemList->mode)) {
        mmceLaunchVcd(itemList, game->name, configSet);
        return;
    }
'''
              replace_once('src/mmcesupport.c', old, new)

          elif branch == 'agent/fix-bdma-transaction-integrity':
              helper_anchor = '''    if (rc != 0)
        unlink(dstPath);
    return rc;
}

// ---- BDMA (BDMAssault exFAT driver) equip -------------------------------------------
'''
              helper_new = '''    if (rc != 0)
        unlink(dstPath);
    return rc;
}

// Read a small existing file into RAM so a live BDMA installation can be restored if replacing it
// fails halfway through. Driver modules are bounded to keep a damaged file from causing unbounded
// allocation; the marker is tiny and uses the same helper.
#define VCD_BACKUP_MAX (2 * 1024 * 1024)
static int vcdReadFileAlloc(const char *path, unsigned char **out, int *outSize)
{
    int fd, used = 0, cap = VCD_COPY_CHUNK;
    unsigned char *buf;

    if (path == NULL || out == NULL || outSize == NULL)
        return -1;
    *out = NULL;
    *outSize = 0;

    fd = open(path, O_RDONLY);
    if (fd < 0)
        return -1;
    buf = (unsigned char *)malloc(cap);
    if (buf == NULL) {
        close(fd);
        return -1;
    }

    for (;;) {
        if (used == cap) {
            int next = cap + VCD_COPY_CHUNK;
            if (next > VCD_BACKUP_MAX) {
                free(buf);
                close(fd);
                return -1;
            }
            unsigned char *grown = (unsigned char *)realloc(buf, next);
            if (grown == NULL) {
                free(buf);
                close(fd);
                return -1;
            }
            buf = grown;
            cap = next;
        }
        int r = read(fd, buf + used, cap - used);
        if (r < 0) {
            free(buf);
            close(fd);
            return -1;
        }
        if (r == 0)
            break;
        used += r;
    }
    close(fd);
    if (used <= 0) {
        free(buf);
        return -1;
    }
    *out = buf;
    *outSize = used;
    return 0;
}

// ---- BDMA (BDMAssault exFAT driver) equip -------------------------------------------
'''
              replace_once('src/vcdsupport.c', helper_anchor, helper_new)

              live_anchor = '''#define VCD_BDMA_MARKER "bdma_config.txt"

// Resolve the memory-card POPSTARTER folder (where the modules live). Prefer an existing folder;
'''
              live_new = '''#define VCD_BDMA_MARKER "bdma_config.txt"

static int vcdBdmaLivePairPresent(const char *mcDir)
{
    char path[96];
    unsigned char byte;

    for (int i = 0; i < 2; i++) {
        snprintf(path, sizeof(path), "%s/%s", mcDir, vcdBdmaModule[i]);
        int fd = open(path, O_RDONLY);
        if (fd < 0)
            return 0;
        int r = read(fd, &byte, 1);
        close(fd);
        if (r != 1)
            return 0;
    }
    return 1;
}

// Resolve the memory-card POPSTARTER folder (where the modules live). Prefer an existing folder;
'''
              replace_once('src/vcdsupport.c', live_anchor, live_new)

              commit_old = '''    // Commit by COPY, not rename(): this dir is always on mc0:/mc1:, and the stock mcman.irx OPL embeds
    // registers the legacy ioman 'mc' device with NO rename op -- iomanX returns -EUNSUP for every mc
    // rename(), so a rename-based swap can never succeed here. If a commit write fails, the CARD is
    // refusing IO: normalize to the consistent no-pair state (POPStarter falls back to its built-in
    // FAT32 driver, same as the VCD_BDMA_FAT32 path) rather than leave a torn mixed-variant pair.
    unlink(dst0); // free the old module's space first; tmp + old + new pairs may not fit a real MC
    r = vcdSafeCopyFile(tmp0, dst0);
    if (r == 0) {
        unlink(dst1);
        r = vcdSafeCopyFile(tmp1, dst1);
    }
    unlink(tmp0);
    unlink(tmp1);
    if (r != 0) {
        unlink(dst0); // drop the half-installed pair; vcdSafeCopyFile already removed its partial write
        unlink(dst1);
        vcdWriteBdmaMarker(mcDir, VCD_BDMA_FAT32);
        return r;
    }

    int mr = vcdWriteBdmaMarker(mcDir, mode);
    return (mr != 0) ? mr : 0;
'''
              commit_new = '''    // Preserve a complete live pair and its marker in RAM before touching either destination. Memory-card
    // rename is unsupported, while keeping .bak copies on-card can exceed real MC free space; RAM gives us
    // an actual rollback path without requiring room for three pairs at once.
    unsigned char *old0 = NULL, *old1 = NULL, *oldMarker = NULL;
    int old0Size = 0, old1Size = 0, oldMarkerSize = 0;
    int hadOldPair = (vcdReadFileAlloc(dst0, &old0, &old0Size) == 0 &&
                      vcdReadFileAlloc(dst1, &old1, &old1Size) == 0);
    if (!hadOldPair) {
        free(old0);
        free(old1);
        old0 = old1 = NULL;
        old0Size = old1Size = 0;
    }
    char markerPath[96];
    snprintf(markerPath, sizeof(markerPath), "%s/%s", mcDir, VCD_BDMA_MARKER);
    int hadOldMarker = (vcdReadFileAlloc(markerPath, &oldMarker, &oldMarkerSize) == 0);

    // Commit by COPY, not rename(): stock mcman exposes no rename operation. Delete each old destination
    // only immediately before writing its replacement. If either write fails, restore the complete old
    // pair and its prior marker instead of converting a working installation into FAT32/no-pair state.
    unlink(dst0);
    r = vcdSafeCopyFile(tmp0, dst0);
    if (r == 0) {
        unlink(dst1);
        r = vcdSafeCopyFile(tmp1, dst1);
    }
    unlink(tmp0);
    unlink(tmp1);
    if (r != 0) {
        unlink(dst0);
        unlink(dst1);
        int restored = 0;
        if (hadOldPair && vcdSafeWriteFile(dst0, old0, old0Size) == 0 &&
            vcdSafeWriteFile(dst1, old1, old1Size) == 0) {
            if (hadOldMarker)
                restored = (vcdSafeWriteFile(markerPath, oldMarker, oldMarkerSize) == 0);
            else {
                unlink(markerPath);
                restored = 1;
            }
        }
        if (!restored) {
            unlink(dst0);
            unlink(dst1);
            vcdWriteBdmaMarker(mcDir, VCD_BDMA_FAT32);
        }
        free(old0);
        free(old1);
        free(oldMarker);
        return r;
    }

    free(old0);
    free(old1);
    free(oldMarker);
    int mr = vcdWriteBdmaMarker(mcDir, mode); // advertise the new mode only after both live files exist
    return (mr != 0) ? mr : 0;
'''
              replace_once('src/vcdsupport.c', commit_old, commit_new)

              skip_old = '''    if (vcdReadBdmaMode() == mode)
        return; // the matching variant is already on the card
'''
              skip_new = '''    char mcDir[64];
    if (vcdReadBdmaMode() == mode &&
        vcdResolvePopstarterMc(mcDir, sizeof(mcDir)) &&
        vcdBdmaLivePairPresent(mcDir))
        return; // marker and both non-empty live modules agree
'''
              replace_once('src/vcdsupport.c', skip_old, skip_new)

          else:
              raise SystemExit(f'unsupported patch branch: {branch}')
          PY

          git fetch origin master
          git checkout origin/master -- .github/workflows/compilation.yml
          rm -f .github/workflows/agent-fix-boot-hdd-probe.yml .agent-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          case "$HEAD_REF" in
            agent/fix-boot-hdd-probe) message="Avoid blind HDD probes during config discovery" ;;
            agent/fix-mmce-vcd-art-quiesce) message="Quiesce MMCE art before VCD launch IO" ;;
            agent/fix-bdma-transaction-integrity) message="Make BDMA driver replacement transactional" ;;
          esac
          git commit -m "$message"
          git push origin HEAD:"$HEAD_REF"
