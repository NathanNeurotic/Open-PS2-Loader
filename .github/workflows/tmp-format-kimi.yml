name: Temporary format Kimi branch

on:
  push:
    branches:
      - agent/kimi-apa-hdl-fix

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/kimi-apa-hdl-fix
      - uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src/hdd.c'
          extensions: 'c'
          clangFormatVersion: 18
          inplace: true
      - name: Commit formatted source and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/tmp-format-kimi.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/hdd.c .github/workflows/tmp-format-kimi.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Format raw APA enumeration'
          git push origin HEAD:agent/kimi-apa-hdl-fix
