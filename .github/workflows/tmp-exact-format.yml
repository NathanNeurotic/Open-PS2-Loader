name: Temporary exact format PR 227

on:
  push:
    branches:
      - agent/grok-apa-hdl-retry

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/grok-apa-hdl-retry
      - name: Remove duplicate Grok retry definitions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/hddsupport.c')
          text = path.read_text()
          block = '#define HDD_GROK_SCAN_ATTEMPTS  10\n#define HDD_GROK_RETRY_DELAY_US (250 * 1000)\n\n'
          first = text.find(block)
          if first < 0:
              raise SystemExit('Grok retry definition block not found')
          prefix = text[:first + len(block)]
          suffix = text[first + len(block):].replace(block, '')
          path.write_text(prefix + suffix)
          PY
      - name: Apply repository formatter to src directory
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: './src'
          extensions: 'c,h'
          clangFormatVersion: 18
          inplace: true
      - name: Commit corrected source and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/tmp-exact-format.yml .tmp-exact-format-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/hddsupport.c .github/workflows/tmp-exact-format.yml .tmp-exact-format-trigger
          git commit -m 'Fix duplicate retry definitions and apply repository formatting'
          git push origin HEAD:agent/grok-apa-hdl-retry
